name: link-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Check links in docs and published JSON
        uses: lycheeverse/lychee-action@v2
        with:
          # Check all Markdown plus the published schema/example/taxonomy JSON ($id/$ref/spec
          # URLs, live since the apex launched). validator/ JSON is intentionally excluded — its
          # test fixtures carry deliberately-unresolvable URLs. Excludes:
          #   example.com — illustrative URLs in example payloads
          args: >-
            --no-progress
            --exclude '^https?://([a-z0-9-]+\.)*example\.com'
            './**/*.md'
            './descriptors/**/*.json'
            './taxonomy/**/*.json'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}
