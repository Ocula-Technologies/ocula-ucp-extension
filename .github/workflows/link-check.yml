name: link-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Check links in docs
        uses: lycheeverse/lychee-action@v2
        with:
          # example.com URLs in the example payloads are illustrative, not real.
          args: >-
            --no-progress
            --exclude '^https?://([a-z0-9-]+\.)*example\.com'
            './**/*.md'
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}
