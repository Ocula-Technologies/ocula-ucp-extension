name: validator

on:
  push:
    branches: [main]
    paths:
      - 'validator/**'
      - 'descriptors/**'
      - '.github/workflows/validator.yml'
  pull_request:
    branches: [main]
    paths:
      - 'validator/**'
      - 'descriptors/**'
      - '.github/workflows/validator.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: validator
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check

      - name: Test
        run: uv run pytest -v

      - name: Smoke-validate the repo's descriptors artifacts
        run: |
          set -euo pipefail
          uv run ocula-ucp-validate manifest ../descriptors/examples/manifest.json
          # Validate every example response against this branch's schemas (--schema-root ..
          # resolves ocula.tech/ucp-extension/* refs from the tree, not the deployed copy).
          for f in ../descriptors/examples/*_response.json; do
            variant="augmented_$(basename "$f" .json)"
            echo "validating $(basename "$f") as $variant"
            uv run ocula-ucp-validate response "$f" \
                --capability ../descriptors/schemas/2026-05-18/descriptors.json \
                --variant "$variant" \
                --schema-root ..
          done
